<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <!-- Placeholder specimen card background -->
  <rect width="320" height="200" fill="#E8E4D9"/>

  <!-- Decorative border -->
  <rect x="12" y="12" width="296" height="176" fill="none" stroke="#C4B998" stroke-width="1"/>

  <!-- Microscope icon -->
  <g transform="translate(120, 50)">
    <!-- Base -->
    <rect x="20" y="80" width="40" height="10" rx="2" fill="#C4B998"/>
    <!-- Vertical stand -->
    <rect x="37" y="20" width="6" height="60" fill="#C4B998"/>
    <!-- Arm -->
    <rect x="10" y="20" width="60" height="6" fill="#C4B998"/>
    <!-- Eyepiece -->
    <rect x="5" y="15" width="20" height="10" rx="2" fill="#C4B998"/>
    <!-- Objective lens -->
    <rect x="55" y="25" width="8" height="30" rx="2" fill="#C4B998"/>
    <!-- Stage -->
    <rect x="35" y="60" width="10" height="20" fill="#C4B998"/>
  </g>

  <!-- Label area -->
  <rect x="40" y="155" width="240" height="25" rx="2" fill="#F5F1E8"/>
  <text x="160" y="172" text-anchor="middle" font-family="monospace" font-size="12" fill="#8B7E6A">SPECIMEN</text>
</svg>